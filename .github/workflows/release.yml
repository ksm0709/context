name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release commits
        id: check
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if echo "$MSG" | grep -qE "^chore: release v"; then
            echo "Skipping release commit: $MSG"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: jdx/mise-action@d6e32c1796099e0f1f3ac741c220a8b7eae9e5dd
        if: steps.check.outputs.skip != 'true'
        with:
          install: true
          cache: true
          experimental: true

      - name: Compute next version
        if: steps.check.outputs.skip != 'true'
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")

          BUMP_MAJOR=0
          BUMP_MINOR=0
          BUMP_PATCH=0

          # Non-release scopes: ci, build, docs, style, test, refactor, chore
          NON_RELEASE_SCOPE="(ci|build|docs|style|test|refactor|chore)"

          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if echo "$commit" | grep -qE "BREAKING[ -]CHANGE|!:"; then
              BUMP_MAJOR=1
            elif echo "$commit" | grep -qE "^feat(\([^)]+\))?:" && ! echo "$commit" | grep -qE "^feat\(${NON_RELEASE_SCOPE}\):"; then
              [ $BUMP_MAJOR -eq 0 ] && BUMP_MINOR=1
            elif echo "$commit" | grep -qE "^(fix|perf)(\([^)]+\))?:" && ! echo "$commit" | grep -qE "^(fix|perf)\(${NON_RELEASE_SCOPE}\):"; then
              [ $BUMP_MAJOR -eq 0 ] && [ $BUMP_MINOR -eq 0 ] && BUMP_PATCH=1
            fi
          done <<< "$COMMITS"

          IFS='.' read -r -a PARTS <<< "$CURRENT"
          MAJ="${PARTS[0]}"; MIN="${PARTS[1]}"; PAT="${PARTS[2]}"

          if [ "$BUMP_MAJOR" -eq 1 ]; then
            MAJ=$((MAJ + 1)); MIN=0; PAT=0
          elif [ "$BUMP_MINOR" -eq 1 ]; then
            MIN=$((MIN + 1)); PAT=0
          elif [ "$BUMP_PATCH" -eq 1 ]; then
            PAT=$((PAT + 1))
          else
            echo "No releasable commits since $LAST_TAG — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="${MAJ}.${MIN}.${PAT}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW_VERSION (since $LAST_TAG)"

      - name: Commit and tag release
        if: steps.check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          npm version "$NEW_VERSION" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: npm publish --tag latest --provenance --access public
