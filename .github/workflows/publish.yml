name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0). Uses current package.json version if omitted.'
        required: false
      tag:
        description: 'npm dist-tag'
        required: true
        type: choice
        options:
          - latest
          - next
        default: latest

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@d6e32c1796099e0f1f3ac741c220a8b7eae9e5dd
        with:
          install: true
          cache: true
          experimental: true

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "Using current version: $VERSION"
          else
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: release v${VERSION}" || echo "No changes to commit"
            git tag "v${VERSION}" || echo "Tag already exists"
            git push origin HEAD --follow-tags || echo "Nothing to push"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --tag ${{ github.event.inputs.tag }} --provenance --access public
